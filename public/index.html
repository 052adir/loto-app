<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <title>לוטו ישראל - מנתח חכם</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3b 100%);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 {
      text-align: center;
      font-size: 2.2em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #8888cc;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.3em;
      color: #aaaadd;
    }

    .loading .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 4px solid #333366;
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Recommendation Cards */
    .rec-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 600px) {
      .rec-section { grid-template-columns: 1fr; }
    }

    .rec-card {
      background: linear-gradient(145deg, #1e1e5a, #2a2a6a);
      border: 2px solid #3a3a8a;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      transition: transform 0.2s;
    }

    .rec-card:hover { transform: translateY(-3px); }

    .rec-card h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #ffd700;
    }

    .numbers-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .ball {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2em;
      background: linear-gradient(145deg, #4444cc, #2222aa);
      border: 2px solid #6666ee;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .ball.strong {
      background: linear-gradient(145deg, #cc8800, #aa6600);
      border-color: #ffaa00;
      color: #fff;
    }

    .strong-label {
      font-size: 0.85em;
      color: #ffaa00;
      margin-bottom: 5px;
    }

    /* Stats Section */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(30, 30, 80, 0.8);
      border: 1px solid #3a3a7a;
      border-radius: 12px;
      padding: 20px;
    }

    .stat-card h3 {
      color: #aaaaee;
      font-size: 1.1em;
      margin-bottom: 12px;
      border-bottom: 1px solid #3a3a7a;
      padding-bottom: 8px;
    }

    .stat-list {
      list-style: none;
    }

    .stat-list li {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.95em;
    }

    .stat-list li .num {
      font-weight: bold;
      color: #ffd700;
      min-width: 30px;
    }

    .stat-list li .val {
      color: #aaaacc;
    }

    /* Heatmap */
    .heatmap {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      margin-bottom: 30px;
    }

    @media (max-width: 500px) {
      .heatmap { grid-template-columns: repeat(6, 1fr); }
    }

    .heat-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.95em;
      cursor: pointer;
      transition: transform 0.15s;
      position: relative;
    }

    .heat-cell:hover {
      transform: scale(1.15);
      z-index: 2;
    }

    .heat-cell .tooltip {
      display: none;
      position: absolute;
      bottom: 110%;
      background: #111;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      white-space: nowrap;
    }

    .heat-cell:hover .tooltip { display: block; }

    /* Pairs */
    .pairs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 30px;
    }

    .pair-badge {
      background: rgba(40, 40, 100, 0.8);
      border: 1px solid #4a4a9a;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      font-size: 0.9em;
    }

    .pair-badge .pair-nums { color: #ffd700; font-weight: bold; }
    .pair-badge .pair-count { color: #8888bb; font-size: 0.85em; }

    /* Info */
    .info-bar {
      text-align: center;
      color: #6666aa;
      font-size: 0.85em;
      padding: 15px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(145deg, #4444cc, #3333aa);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.2s;
      margin: 5px;
    }

    .btn:hover { background: linear-gradient(145deg, #5555dd, #4444bb); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-gold {
      background: linear-gradient(145deg, #cc8800, #aa6600);
    }
    .btn-gold:hover { background: linear-gradient(145deg, #dd9900, #bb7700); }

    .actions { text-align: center; margin-bottom: 30px; }

    .section-title {
      font-size: 1.4em;
      color: #ccccff;
      margin-bottom: 15px;
      text-align: center;
    }

    /* Last draws table */
    .draws-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .draws-table th {
      background: rgba(40, 40, 100, 0.8);
      padding: 10px;
      text-align: center;
      color: #aaaaee;
    }

    .draws-table td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .draws-table tr:hover { background: rgba(50, 50, 120, 0.3); }

    .mini-ball {
      display: inline-flex;
      width: 30px; height: 30px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
      font-weight: bold;
      background: #3333aa;
      margin: 1px;
    }

    .mini-ball.strong {
      background: #aa6600;
    }

    footer {
      text-align: center;
      color: #444477;
      padding: 20px;
      font-size: 0.85em;
    }

    /* Last Draw Evaluation Section */
    .eval-section {
      background: linear-gradient(145deg, #1a1a50, #222260);
      border: 2px solid #3a3a8a;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .eval-section h3 {
      text-align: center;
      font-size: 1.4em;
      color: #ffd700;
      margin-bottom: 8px;
    }

    .eval-draw-info {
      text-align: center;
      color: #8888cc;
      font-size: 0.95em;
      margin-bottom: 20px;
    }

    .eval-lines {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .eval-lines { grid-template-columns: 1fr; }
    }

    .eval-line-card {
      background: rgba(20, 20, 60, 0.7);
      border: 1px solid #3a3a7a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .eval-line-card h4 {
      color: #ccccff;
      font-size: 1.05em;
      margin-bottom: 10px;
    }

    .eval-balls {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .eval-ball {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.05em;
      transition: transform 0.2s;
    }

    .eval-ball.hit {
      background: linear-gradient(145deg, #22aa44, #119933);
      border: 2px solid #44dd66;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .eval-ball.miss {
      background: rgba(60, 40, 80, 0.6);
      border: 2px solid #555577;
      color: #777799;
    }

    .eval-ball.strong-hit {
      background: linear-gradient(145deg, #cc8800, #aa6600);
      border: 2px solid #ffaa00;
      color: #fff;
    }

    .eval-ball.strong-miss {
      background: rgba(80, 50, 30, 0.5);
      border: 2px solid #665533;
      color: #887755;
    }

    .eval-hit-count {
      font-size: 1.1em;
      font-weight: bold;
      margin-top: 6px;
    }

    .eval-hit-count .hit-num { color: #44dd66; }
    .eval-hit-count .miss-num { color: #887766; }

    .eval-bar-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .eval-bar {
      display: flex;
      width: 120px;
      height: 14px;
      border-radius: 7px;
      overflow: hidden;
      background: rgba(40, 40, 80, 0.8);
    }

    .eval-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22aa44, #44dd66);
      border-radius: 7px 0 0 7px;
      transition: width 0.6s ease;
    }

    .eval-bar-label {
      font-size: 0.85em;
      color: #aaaacc;
    }

    .eval-actual-row {
      text-align: center;
      margin-bottom: 18px;
    }

    .eval-actual-row .label {
      color: #8888cc;
      font-size: 0.9em;
      margin-bottom: 6px;
    }

    .eval-summary {
      text-align: center;
      padding: 12px;
      background: rgba(30, 30, 70, 0.6);
      border-radius: 10px;
      margin-top: 10px;
    }

    .eval-summary .big-stat {
      font-size: 2em;
      font-weight: bold;
      color: #ffd700;
    }

    .eval-summary .big-label {
      font-size: 0.9em;
      color: #8888cc;
    }

    /* Algorithm Insights */
    .eval-insights {
      margin-top: 18px;
      background: rgba(20, 20, 55, 0.7);
      border: 1px solid #3a3a7a;
      border-radius: 12px;
      padding: 16px 20px;
    }

    .eval-insights h4 {
      color: #ffd700;
      font-size: 1.1em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .eval-insights ul {
      list-style: none;
      padding: 0;
    }

    .eval-insights li {
      position: relative;
      padding: 7px 0 7px 22px;
      color: #ccccee;
      font-size: 0.95em;
      line-height: 1.55;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .eval-insights li:last-child {
      border-bottom: none;
    }

    .eval-insights li::before {
      content: '';
      position: absolute;
      right: 0;
      top: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd700;
    }

    .eval-insights .weight-bars {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .eval-insights .wb-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 70px;
    }

    .eval-insights .wb-label {
      font-size: 0.78em;
      color: #8888bb;
      margin-bottom: 4px;
    }

    .eval-insights .wb-track {
      width: 60px;
      height: 8px;
      background: rgba(40, 40, 80, 0.9);
      border-radius: 4px;
      overflow: hidden;
    }

    .eval-insights .wb-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .eval-insights .wb-val {
      font-size: 0.78em;
      color: #aaaacc;
      margin-top: 2px;
    }

    /* Next Draw Banner */
    .next-draw-banner {
      text-align: center;
      background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,140,0,0.10));
      border: 2px solid rgba(255,215,0,0.35);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .next-draw-banner .ndb-label {
      font-size: 0.95em;
      color: #aaaacc;
      margin-bottom: 4px;
    }

    .next-draw-banner .ndb-date {
      font-size: 1.5em;
      font-weight: bold;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .next-draw-banner .ndb-day {
      font-size: 1.05em;
      color: #ccccff;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎰 לוטו ישראל - מנתח חכם</h1>
    <p class="subtitle">ניתוח סטטיסטי של כל ההגרלות ההיסטוריות</p>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>טוען נתונים מכל ההגרלות...</div>
      </div>
    </div>

    <footer>
      ⚠️ הניתוח מבוסס על סטטיסטיקה בלבד ואינו מבטיח זכייה.
      הלוטו הוא משחק מזל ולכל מספר אותם סיכויים בכל הגרלה.
    </footer>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/api/analyze', { cache: 'no-store' });
        const data = await res.json();
        renderAll(data);
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="loading" style="color:#ff6666;">שגיאה בטעינת נתונים: ${err.message}</div>`;
      }
    }

    function getNextDrawDate() {
      // Israeli Lotto draws: Tuesday (2), Thursday (4), Saturday (6)
      const drawDays = [2, 4, 6];
      const now = new Date();
      // Work in Israel timezone (UTC+3 / UTC+2 depending on DST)
      const ilOffset = now.toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' });
      const ilNow = new Date(ilOffset);

      for (let d = 0; d <= 7; d++) {
        const candidate = new Date(ilNow);
        candidate.setDate(ilNow.getDate() + d);
        if (drawDays.includes(candidate.getDay())) {
          // If today is a draw day, only show it if before 22:00 (draw hasn't happened yet)
          if (d === 0 && ilNow.getHours() >= 22) continue;
          return candidate;
        }
      }
      return null;
    }

    function formatHebrewDay(date) {
      const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
      return 'יום ' + days[date.getDay()];
    }

    function renderAll(data) {
      const { line1, line2, analysis, lastDrawEval, algorithmInsights } = data;
      const html = [];

      // Next Draw Date Banner
      const nextDraw = getNextDrawDate();
      if (nextDraw) {
        const dateStr = nextDraw.toLocaleDateString('he-IL', { day: 'numeric', month: 'long', year: 'numeric' });
        const dayName = formatHebrewDay(nextDraw);
        html.push(`
          <div class="next-draw-banner">
            <div class="ndb-label">🎯 מיועד להגרלה שתערך ב-</div>
            <div class="ndb-date">${dateStr}</div>
            <div class="ndb-day">${dayName}</div>
          </div>
        `);
      }

      // Recommendations
      html.push(`
        <div class="rec-section">
          <div class="rec-card">
            <h2>🎯 שורה 1</h2>
            <div class="numbers-row">
              ${line1.numbers.map(n => `<div class="ball">${n}</div>`).join('')}
            </div>
            <div class="strong-label">💪 מספר חזק</div>
            <div class="numbers-row">
              <div class="ball strong">${line1.strong}</div>
            </div>
          </div>
          <div class="rec-card">
            <h2>🎯 שורה 2</h2>
            <div class="numbers-row">
              ${line2.numbers.map(n => `<div class="ball">${n}</div>`).join('')}
            </div>
            <div class="strong-label">💪 מספר חזק</div>
            <div class="numbers-row">
              <div class="ball strong">${line2.strong}</div>
            </div>
          </div>
        </div>
      `);

      // Info bar
      html.push(`
        <div class="info-bar">
          📊 ניתוח מבוסס על ${analysis.totalDrawsAnalyzed} הגרלות
          (${new Date(analysis.dateRange.from).toLocaleDateString('he-IL')} - ${new Date(analysis.dateRange.to).toLocaleDateString('he-IL')})
        </div>
      `);

      // Actions
      html.push(`
        <div class="actions">
          <button class="btn" onclick="loadData()">🔄 ניתוח מחדש</button>
          <button class="btn btn-gold" onclick="sendNotification()">📱 שלח WhatsApp עכשיו</button>
        </div>
      `);

      // Last Draw Evaluation Section
      if (lastDrawEval) {
        const ev = lastDrawEval;
        const drawDate = ev.date ? new Date(ev.date).toLocaleDateString('he-IL') : `#${ev.drawId}`;

        html.push(`<div class="eval-section">`);
        html.push(`<h3>📋 ניתוח הגרלה אחרונה</h3>`);
        html.push(`<div class="eval-draw-info">הגרלה #${ev.drawId} — ${drawDate}</div>`);

        // Actual winning numbers
        html.push(`<div class="eval-actual-row">`);
        html.push(`<div class="label">מספרים שעלו בהגרלה</div>`);
        html.push(`<div class="eval-balls">`);
        for (const n of ev.actual.numbers) {
          html.push(`<div class="eval-ball hit">${n}</div>`);
        }
        html.push(`<div class="eval-ball strong-hit">${ev.actual.strong}</div>`);
        html.push(`</div></div>`);

        // Line 1 and Line 2 evaluation
        html.push(`<div class="eval-lines">`);

        // Line 1
        html.push(`<div class="eval-line-card">`);
        html.push(`<h4>שורה 1 — חיזוי</h4>`);
        html.push(`<div class="eval-balls">`);
        for (const d of ev.line1.detail) {
          html.push(`<div class="eval-ball ${d.hit ? 'hit' : 'miss'}">${d.number}</div>`);
        }
        const s1cls = ev.line1.strong.hit ? 'strong-hit' : 'strong-miss';
        html.push(`<div class="eval-ball ${s1cls}">${ev.line1.strong.predicted}</div>`);
        html.push(`</div>`);
        html.push(`<div class="eval-hit-count"><span class="${ev.line1.hitsCount > 0 ? 'hit-num' : 'miss-num'}">${ev.line1.hitsCount}/6</span> מספרים זוהו`);
        if (ev.line1.strong.hit) html.push(` + חזק!`);
        html.push(`</div>`);
        html.push(`<div class="eval-bar-container"><div class="eval-bar"><div class="eval-bar-fill" style="width:${(ev.line1.hitsCount / 6 * 100)}%"></div></div><span class="eval-bar-label">${Math.round(ev.line1.hitsCount / 6 * 100)}%</span></div>`);
        html.push(`</div>`);

        // Line 2
        html.push(`<div class="eval-line-card">`);
        html.push(`<h4>שורה 2 — חיזוי</h4>`);
        html.push(`<div class="eval-balls">`);
        for (const d of ev.line2.detail) {
          html.push(`<div class="eval-ball ${d.hit ? 'hit' : 'miss'}">${d.number}</div>`);
        }
        const s2cls = ev.line2.strong.hit ? 'strong-hit' : 'strong-miss';
        html.push(`<div class="eval-ball ${s2cls}">${ev.line2.strong.predicted}</div>`);
        html.push(`</div>`);
        html.push(`<div class="eval-hit-count"><span class="${ev.line2.hitsCount > 0 ? 'hit-num' : 'miss-num'}">${ev.line2.hitsCount}/6</span> מספרים זוהו`);
        if (ev.line2.strong.hit) html.push(` + חזק!`);
        html.push(`</div>`);
        html.push(`<div class="eval-bar-container"><div class="eval-bar"><div class="eval-bar-fill" style="width:${(ev.line2.hitsCount / 6 * 100)}%"></div></div><span class="eval-bar-label">${Math.round(ev.line2.hitsCount / 6 * 100)}%</span></div>`);
        html.push(`</div>`);

        html.push(`</div>`); // .eval-lines

        // Combined summary
        html.push(`<div class="eval-summary">`);
        html.push(`<div class="big-stat">${ev.totalUniqueHits}/${ev.totalUniquePredicted}</div>`);
        html.push(`<div class="big-label">סה"כ מספרים ייחודיים שנחזו נכון</div>`);
        html.push(`</div>`);

        // Algorithm Insights
        if (algorithmInsights && algorithmInsights.insights && algorithmInsights.insights.length > 0) {
          const ai = algorithmInsights;
          html.push(`<div class="eval-insights">`);
          html.push(`<h4>🧠 מסקנות האלגוריתם:</h4>`);
          html.push(`<ul>`);
          for (const insight of ai.insights) {
            html.push(`<li>${insight}</li>`);
          }
          html.push(`</ul>`);

          // Weight bars visualization
          if (ai.deltas && ai.deltas.length > 0) {
            const colors = { frequency: '#4488ff', trend: '#44dd66', overdue: '#ffaa00', pairs: '#dd44aa' };
            html.push(`<div class="weight-bars">`);
            for (const d of ai.deltas) {
              const color = colors[d.method] || '#8888cc';
              const pct = Math.min(d.weight, 50);
              const deltaStr = d.delta > 0 ? '+' + d.delta : d.delta === 0 ? '=' : '' + d.delta;
              html.push(`
                <div class="wb-item">
                  <div class="wb-label">${d.name}</div>
                  <div class="wb-track"><div class="wb-fill" style="width:${pct * 2}%; background:${color};"></div></div>
                  <div class="wb-val">${d.weight.toFixed(1)}% (${deltaStr})</div>
                </div>
              `);
            }
            html.push(`</div>`);
          }

          html.push(`</div>`); // .eval-insights
        }

        html.push(`</div>`); // .eval-section
      }

      // Heatmap
      html.push(`<h3 class="section-title">🗺️ מפת חום - ציון משולב לכל מספר</h3>`);
      const maxScore = analysis.allScores[0].score;
      html.push(`<div class="heatmap">`);
      for (let i = 1; i <= 37; i++) {
        const item = analysis.allScores.find(x => x.number === i);
        const intensity = item.score / maxScore;
        const r = Math.round(40 + intensity * 200);
        const g = Math.round(20 + intensity * 100);
        const b = Math.round(100 - intensity * 60);
        html.push(`
          <div class="heat-cell" style="background:rgb(${r},${g},${b});">
            ${i}
            <div class="tooltip">מספר ${i}: ציון ${item.score}</div>
          </div>
        `);
      }
      html.push(`</div>`);

      // Stats grid
      html.push(`<div class="stats-grid">`);

      // Top frequent
      html.push(`<div class="stat-card"><h3>🔥 הנפוצים ביותר</h3><ul class="stat-list">`);
      for (const item of analysis.topFrequent) {
        html.push(`<li><span class="num">${item.number}</span><span class="val">${item.count} פעמים (${item.pct}%)</span></li>`);
      }
      html.push(`</ul></div>`);

      // Top trending
      html.push(`<div class="stat-card"><h3>📈 במגמת עלייה</h3><ul class="stat-list">`);
      for (const item of analysis.topTrending) {
        html.push(`<li><span class="num">${item.number}</span><span class="val">ציון: ${item.score}</span></li>`);
      }
      html.push(`</ul></div>`);

      // Overdue
      html.push(`<div class="stat-card"><h3>⏰ מאחרים (לא הופיעו הכי הרבה זמן)</h3><ul class="stat-list">`);
      for (const item of analysis.topOverdue) {
        html.push(`<li><span class="num">${item.number}</span><span class="val">${item.drawsSinceLastSeen} הגרלות</span></li>`);
      }
      html.push(`</ul></div>`);

      html.push(`</div>`);

      // Hot pairs
      html.push(`<h3 class="section-title">🔗 זוגות חמים</h3>`);
      html.push(`<div class="pairs-grid">`);
      for (const p of analysis.hotPairs.slice(0, 12)) {
        html.push(`<div class="pair-badge"><div class="pair-nums">${p.pair}</div><div class="pair-count">${p.count} פעמים</div></div>`);
      }
      html.push(`</div>`);

      // Strong number scores
      html.push(`<h3 class="section-title">💪 מספר חזק - דירוג</h3>`);
      html.push(`<div class="numbers-row" style="margin-bottom:30px;">`);
      for (const s of analysis.strongScores) {
        const opacity = 0.4 + (s.score / analysis.strongScores[0].score) * 0.6;
        html.push(`<div class="ball strong" style="opacity:${opacity}; width:55px; height:55px; font-size:1.3em;" title="ציון: ${s.score}">${s.number}</div>`);
      }
      html.push(`</div>`);

      document.getElementById('content').innerHTML = html.join('');
    }

    async function sendNotification() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '📤 שולח...';
      try {
        const res = await fetch('/api/notify', { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          btn.textContent = '✅ נשלח!';
        } else {
          btn.textContent = '❌ ' + (data.error || 'שגיאה');
        }
      } catch (err) {
        btn.textContent = '❌ שגיאה';
      }
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '📱 שלח WhatsApp עכשיו';
      }, 3000);
    }

    loadData();

    // Register service worker for PWA — updateViaCache ensures fresh SW on every visit
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(() => {});
    }
  </script>
</body>
</html>
